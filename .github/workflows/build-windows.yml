name: Build Windows Desktop Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            clients/web-overlay/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85.0'
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install backend dependencies
        run: npm ci --prefix app

      - name: Install shared client dependencies
        run: npm ci --prefix clients/web-overlay

      - name: Test backend
        run: npm test --prefix app

      - name: Test shared and extension units
        run: node --test --test-concurrency=1 clients/web-overlay/tests/client-identity.test.mjs clients/web-overlay/tests/cross-platform-contract.test.mjs clients/web-overlay/tests/desktop-nickname.test.mjs clients/web-overlay/tests/desktop-panel.test.mjs clients/web-overlay/tests/desktop-settings-adapter.test.mjs clients/web-overlay/tests/extension-background.test.mjs clients/web-overlay/tests/extension-message-schema.test.mjs clients/web-overlay/tests/extension-storage.test.mjs clients/web-overlay/tests/hsv-color-picker.test.mjs clients/web-overlay/tests/overlay-controller.test.mjs clients/web-overlay/tests/overlay-css.test.mjs clients/web-overlay/tests/overlay-layout.test.mjs clients/web-overlay/tests/overlay-template.test.mjs clients/web-overlay/tests/room-manager.test.mjs clients/web-overlay/tests/room-model.test.mjs clients/web-overlay/tests/safe-render.test.mjs clients/web-overlay/tests/send-state.test.mjs clients/web-overlay/tests/settings-contract.test.mjs clients/web-overlay/tests/settings-store.test.mjs

      - name: Build shared desktop assets
        env:
          DANMAKU_SERVER_URL: http://127.0.0.1:3999
        run: npm run build:desktop --prefix clients/web-overlay

      - name: Test desktop JavaScript and cross-client contracts
        run: node --test desktop/tests/config.test.mjs desktop/tests/room-contract.test.mjs

      - name: Test repository policy tools
        run: node --test --test-concurrency=1 scripts/tests/workflows.test.mjs scripts/tests/documentation.test.mjs scripts/tests/android-parity.test.mjs scripts/tests/verify-retired-stock.test.mjs

      - name: Test Tauri Rust
        run: cargo test --manifest-path desktop/src-tauri/Cargo.toml --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "2.11.4" --locked

      - name: Build Windows bundles
        env:
          DANMAKU_SERVER_URL: https://danmaku.kolvid.app
        run: npm run tauri:build --prefix clients/web-overlay -- --target x86_64-pc-windows-msvc

      - name: Verify Windows bundles exist
        shell: pwsh
        run: |
          $bundleRoot = 'desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle'
          $nsisExecutables = @(Get-ChildItem -Path (Join-Path $bundleRoot 'nsis') -Filter '*.exe' -File -ErrorAction SilentlyContinue)
          $msiPackages = @(Get-ChildItem -Path (Join-Path $bundleRoot 'msi') -Filter '*.msi' -File -ErrorAction SilentlyContinue)
          if ($nsisExecutables.Count -lt 1) { throw 'Expected at least one NSIS .exe bundle.' }
          if ($msiPackages.Count -lt 1) { throw 'Expected at least one MSI .msi bundle.' }

      - name: Mark artifacts as unsigned
        shell: pwsh
        run: |
          $bundleRoot = 'desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle'
          New-Item -ItemType Directory -Force -Path $bundleRoot | Out-Null
          Set-Content -Path (Join-Path $bundleRoot 'UNSIGNED-ARTIFACT.txt') -Value 'UNSIGNED: no signing identity or certificate is used by this workflow.'

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v6
        with:
          name: danmaku-overlay-windows-x86_64-unsigned
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/UNSIGNED-ARTIFACT.txt
