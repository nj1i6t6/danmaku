name: Build and Verify Android Signed Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: android-release
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate release signing secrets
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for variable in \
            ANDROID_RELEASE_KEYSTORE_BASE64 \
            ANDROID_RELEASE_STORE_PASSWORD \
            ANDROID_RELEASE_KEY_ALIAS \
            ANDROID_RELEASE_KEY_PASSWORD; do
            if [[ -z "${!variable:-}" ]]; then
              echo "::error::${variable} must be configured"
              exit 1
            fi
          done

      - name: Decode release keystore
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          release_keystore="${RUNNER_TEMP}/danmaku-release.keystore"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$release_keystore"
          chmod 600 "$release_keystore"
          test -s "$release_keystore"
          printf 'DANMAKU_RELEASE_STORE_FILE=%s\n' "$release_keystore" >> "$GITHUB_ENV"

      - name: Test, lint, and assemble signed Android release
        env:
          DANMAKU_SERVER_URL: https://danmaku.kolvid.app
          DANMAKU_RELEASE_STORE_FILE: ${{ runner.temp }}/danmaku-release.keystore
          DANMAKU_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          DANMAKU_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          DANMAKU_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: android/gradlew -p android testDebugUnitTest lintRelease assembleRelease bundleRelease --no-daemon

      - name: Verify signed Android release and create SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t apks < <(find android/app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print)
          mapfile -t aabs < <(find android/app/build/outputs/bundle/release -maxdepth 1 -type f -name '*.aab' -print)
          if [[ "${#apks[@]}" -ne 1 ]]; then
            echo "::error::expected exactly one APK release output, found ${#apks[@]}"
            exit 1
          fi
          if [[ "${#aabs[@]}" -ne 1 ]]; then
            echo "::error::expected exactly one AAB release output, found ${#aabs[@]}"
            exit 1
          fi
          apk="${apks[0]}"
          aab="${aabs[0]}"
          apksigner="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          test -x "$apksigner"
          apk_verify_output="${RUNNER_TEMP}/danmaku-apksigner-verify.txt"
          if ! "$apksigner" verify --verbose --print-certs "$apk" > "$apk_verify_output" 2>&1; then
            cat "$apk_verify_output"
            exit 1
          fi
          cat "$apk_verify_output"
          apk_digest_line_count="$(grep -Fc 'Signer #1 certificate SHA-256 digest:' "$apk_verify_output" || true)"
          if [[ "$apk_digest_line_count" -ne 1 ]]; then
            echo "::error::APK identity verification must expose exactly one certificate SHA-256 digest"
            exit 1
          fi
          expected_apk_certificate_sha256='f84e66da1201106a5b93bdc8f0a8747cd0482dc4fbb30a0dbf647bcb65f12578'
          apk_certificate_sha256="$(grep -F 'Signer #1 certificate SHA-256 digest:' "$apk_verify_output" | cut -d: -f2- | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
          if [[ "$apk_certificate_sha256" != "$expected_apk_certificate_sha256" ]]; then
            echo "::error::APK certificate SHA-256 identity does not match the release certificate"
            exit 1
          fi

          aab_verify_output="${RUNNER_TEMP}/danmaku-jarsigner-verify.txt"
          if ! jarsigner --verify --verbose --certs "$aab" > "$aab_verify_output" 2>&1; then
            cat "$aab_verify_output"
            exit 1
          fi
          cat "$aab_verify_output"
          if ! grep -Fq 'jar verified.' "$aab_verify_output"; then
            echo "::error::AAB jarsigner output did not contain 'jar verified.'"
            exit 1
          fi
          if grep -Fq 'jar is unsigned' "$aab_verify_output"; then
            echo "::error::AAB is unsigned"
            exit 1
          fi

          aab_certificate_output="${RUNNER_TEMP}/danmaku-keytool-aab-cert.txt"
          if ! keytool -printcert -jarfile "$aab" > "$aab_certificate_output" 2>&1; then
            cat "$aab_certificate_output"
            exit 1
          fi
          cat "$aab_certificate_output"
          aab_digest_line_count="$(grep -Ec '^[[:space:]]*SHA256:' "$aab_certificate_output" || true)"
          if [[ "$aab_digest_line_count" -ne 1 ]]; then
            echo "::error::AAB identity verification must expose exactly one SHA256 certificate fingerprint"
            exit 1
          fi
          expected_release_certificate_sha256='f84e66da1201106a5b93bdc8f0a8747cd0482dc4fbb30a0dbf647bcb65f12578'
          aab_certificate_sha256="$(grep -E '^[[:space:]]*SHA256:' "$aab_certificate_output" | cut -d: -f2- | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          if [[ "$aab_certificate_sha256" != "$expected_release_certificate_sha256" ]]; then
            echo "::error::AAB certificate SHA-256 identity does not match the release certificate"
            exit 1
          fi

          checksum_dir="${RUNNER_TEMP}/danmaku-android-release"
          rm -rf "$checksum_dir"
          mkdir -p "$checksum_dir"
          apk_name="$(basename "$apk")"
          aab_name="$(basename "$aab")"
          cp "$apk" "$checksum_dir/$apk_name"
          cp "$aab" "$checksum_dir/$aab_name"
          (cd "$checksum_dir" && sha256sum "$apk_name" "$aab_name" > SHA256SUMS)
          (cd "$checksum_dir" && sha256sum --check SHA256SUMS)

      - name: Upload signed Android release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: danmaku-overlay-android-signed-release
          if-no-files-found: error
          path: ${{ runner.temp }}/danmaku-android-release

      - name: Cleanup Android release secrets
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            "${RUNNER_TEMP}/danmaku-release.keystore" \
            "${RUNNER_TEMP}/danmaku-apksigner-verify.txt" \
            "${RUNNER_TEMP}/danmaku-jarsigner-verify.txt" \
            "${RUNNER_TEMP}/danmaku-keytool-aab-cert.txt"
          rm -rf "${RUNNER_TEMP}/danmaku-android-release"
