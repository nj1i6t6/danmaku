<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>彈幕 Overlay 設定</title><link rel="stylesheet" href="options.css"></head><body><main><h1>彈幕 Overlay 設定</h1><section class="notice"><h2>網站存取說明</h2><p>為了在一般 HTTP/HTTPS 網頁顯示自己的 Shadow DOM Overlay，擴充套件需要廣泛網站權限。它不讀取或傳送頁面正文、表單、Cookie、localStorage 或網址參數，也不建立頁面與擴充套件間的任意訊息橋接。</p></section><form id="appearance-form"><label>懸浮球大小 <input id="ball-size" type="range" min="32" max="96"></label><label>彈幕字體大小 <input id="danmaku-size" type="range" min="12" max="48"></label><label>面板寬度 <input id="panel-width" type="range" min="280" max="800"></label><div class="actions"><button type="submit">儲存</button><button id="reset" type="button" class="secondary">恢復外觀預設</button></div></form><p id="result" role="status"></p><section><h2>隱私與安全</h2><p>房主管理憑證只保存在背景 trusted storage，content script 與網頁都無法取得。公開 source build 預設只連本機 endpoint。</p></section></main><script src="options.js"></script></body></html>
